name: Build and Push Docker Image

on:
    push:
        branches:
            - main
        tags:
            - "v*"
    pull_request:
        branches:
            - main
    workflow_dispatch:
        description: 'Manually build and push Docker image'
        inputs:
            create_release:
                description: 'Create GitHub Release'
                default: 'false'
                required: false
                type: boolean

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}
    LLAMA_CPP_REPO: ggml-org/llama.cpp

jobs:
    get-latest-release:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.get-version.outputs.version }}
            body: ${{ steps.get-version.outputs.body }}
        steps:
            - name: Get latest llama.cpp release
              id: get-version
              run: |
                  VERSION=$(curl -sL https://api.github.com/repos/${{ env.LLAMA_CPP_REPO }}/releases/latest | jq -r '.tag_name')
                  BODY=$(curl -sL https://api.github.com/repos/${{ env.LLAMA_CPP_REPO }}/releases/latest | jq -r '.body')
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "body<<EOF" >> $GITHUB_OUTPUT
                  echo "$BODY" >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT
                  echo "Latest llama.cpp release: $VERSION"

    build-and-push:
        runs-on: ubuntu-latest
        needs: get-latest-release
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 1

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Restore ccache
              uses: actions/cache@v4
              with:
                  path: /tmp/ccache
                  key: ccache-llama-${{ needs.get-latest-release.outputs.version }}
                  restore-keys: |
                      ccache-llama-

            - name: Log in to Container Registry
              if: github.event_name != 'pull_request'
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata for Docker
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=ref,event=branch
                      type=ref,event=pr
                      type=sha,prefix=
                      type=raw,value=latest,enable={{is_default_branch}}
                      type=match,pattern=v(.+),group=1

            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  platforms: linux/arm64
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: |
                      ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
                      ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.get-latest-release.outputs.version }}
                      ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
                  labels: |
                      ${{ steps.meta.outputs.labels }}
                      org.opencontainers.image.source=https://github.com/${{ github.repository }}
                      org.opencontainers.image.description=llama.cpp server built for arm64
                  cache-from: type=gha,scope=main
                  cache-to: type=gha,mode=max,scope=main
                  build-args: |
                      LLAMA_VERSION=${{ needs.get-latest-release.outputs.version }}

            - name: Display build info
              run: |
                  echo "Built with llama.cpp version: ${{ needs.get-latest-release.outputs.version }}"

    create-release:
        runs-on: ubuntu-latest
        needs: [get-latest-release, build-and-push]
        permissions:
            contents: write
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
        steps:
            - name: Extract tag name
              id: extract-tag
              run: |
                  TAG_NAME=$(echo "${{ github.ref }}" | sed 's|refs/tags/||')
                  echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
                  echo "Extracted tag: $TAG_NAME"

            - name: Create GitHub Release
              uses: actions/create-release@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: ${{ steps.extract-tag.outputs.tag_name }}
                  release_name: Release ${{ steps.extract-tag.outputs.tag_name }}
                  body: |
                      ## Docker Image

                      **Image:** `ghcr.io/${{ github.repository }}:${{ needs.get-latest-release.outputs.version }}`

                      ### Build Info
                      - **Architecture:** arm64
                      - **llama.cpp Version:** ${{ needs.get-latest-release.outputs.version }}
                      - **Base Image:** Ubuntu 22.04
                      - **Compiler Cache:** ccache enabled
                      - **Optimizations:** ccache, GHA cache

                      ### Usage
                      ```bash
                      docker run -p 8080:8080 ghcr.io/${{ github.repository }}:${{ needs.get-latest-release.outputs.version }}
                      ```

                      ---
                      ## Original llama.cpp Release Notes

                      ${{ needs.get-latest-release.outputs.body }}
                  draft: false
                  prerelease: false
